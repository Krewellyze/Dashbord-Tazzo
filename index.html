<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Dashboard Premium V14.1</title>
<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:#fff;
    font-family:Arial,sans-serif;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
.container{max-width:480px;margin:auto}
.logo{text-align:center;font-size:42px;margin-bottom:18px}
.logo span{font-family:'Bring Race',sans-serif !important}
.white{color:#fff}
.red{color:#ff0000;text-shadow:0 0 8px #ff0000}
.data-brasilia{text-align:center;font-size:13px;color:#ddd;margin-bottom:16px}
.card{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,.18);
    backdrop-filter:blur(12px);
}
button,input,select{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}
input,select{
    background:rgba(0,0,0,.35);
    color:#fff;
}
button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}
.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    overflow:hidden;
    margin:8px 0;
}
.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
    transition:.4s;
}
.rank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}
hr{
    border:0;
    border-top:1px solid rgba(255,255,255,.15);
    margin:18px 0;
}
</style>
</head>
<body>
<div class="container">
<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>
<div id="dataHora" class="data-brasilia"></div>
<div class="card">
<h3>Meta Geral da Loja</h3>
<div>Total: R$ <span id="totalLoja">0,00</span></div>
<div id="percentLoja">0%</div>
<div class="progress-container">
<div class="progress-bar" id="barraLoja"></div>
</div>
<div id="metaInfo"></div>
</div>
<div class="card">
<h3>Performance Mensal</h3>
<div id="performanceMensal"></div>
</div>
<div class="card">
<h3>Performance Semanal</h3>
<div id="performanceSemanal"></div>
</div>
<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>
<div class="card">
<select id="vendedor">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>
<hr>
<h3>Ajustes Manuais</h3>
<input type="text" id="valorTotalCorrecao" placeholder="Novo total geral">
<button onclick="corrigirTotalGeral()">Corrigir total geral</button>
<select id="vendedorCorrecao">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>
<input type="text" id="novoValorVendedor" placeholder="Novo valor acumulado">
<select id="categoriaCorrecaoVendedor">
<option value="geral">Somente Geral</option>
<option value="semanaAtual">Semana Atual</option>
<option value="mensal">Mensal Atual</option>
</select>
<button onclick="corrigirValorVendedor()">
Corrigir valor do vendedor
</button>
</div>
</div>
<script>
const META_MENSAL = 70000;
const META_SEMANAL = 17500;
const META_LOJA = 210000;

const vendedores = ["Joabe", "João Gabriel", "Fábio"];

let vendas;
let semanaAtual;
let correcaoTotalGeral;

try{
    vendas = JSON.parse(localStorage.getItem("vendas")) || {
        "Joabe":16114.43,
        "João Gabriel":11231.53,
        "Fábio":15809.44,
        "Caio Henrique":2566.35
    };
}catch{
    vendas = {
        "Joabe":16114.43,
        "João Gabriel":11231.53,
        "Fábio":15809.44,
        "Caio Henrique":2566.35
    };
}

try{
    semanaAtual = JSON.parse(localStorage.getItem("semanaAtual")) || {
        "Joabe":0,
        "João Gabriel":0,
        "Fábio":0
    };
}catch{
    semanaAtual = {
        "Joabe":0,
        "João Gabriel":0,
        "Fábio":0
    };
}

correcaoTotalGeral =
    Number(localStorage.getItem("correcaoTotalGeral")) || 0;

function salvarDados(){
    localStorage.setItem("vendas", JSON.stringify(vendas));
    localStorage.setItem("semanaAtual", JSON.stringify(semanaAtual));
    localStorage.setItem("correcaoTotalGeral", correcaoTotalGeral);
}

function agoraBrasilia(){
    return new Date(
        new Date().toLocaleString("en-US", {
            timeZone:"America/Sao_Paulo"
        })
    );
}

function formatar(v){
    return Number(v || 0).toLocaleString("pt-BR", {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function percentual(v,m){
    if(!m || m <= 0) return "0.0";
    return ((Number(v || 0) / m) * 100).toFixed(1);
}

function corrigirTotalGeral(){
    const campo = document.getElementById("valorTotalCorrecao");

    const novoTotal = parseFloat(
        campo.value
            .replace(/\./g,"")
            .replace(",",".")
    );

    if(isNaN(novoTotal) || novoTotal < 0){
        alert("Digite um valor válido.");
        return;
    }

    const totalAtual = Object.values(vendas)
        .reduce((a,b)=>a + Number(b || 0), 0);

    correcaoTotalGeral = novoTotal - totalAtual;

    salvarDados();
    atualizarDashboard();

    campo.value = "";

    alert("Total geral corrigido com sucesso.");
}

function corrigirValorVendedor(){
    const vendedor =
        document.getElementById("vendedorCorrecao").value;

    const campo =
        document.getElementById("novoValorVendedor");

    const novoValor = parseFloat(
        campo.value
            .replace(/\./g,"")
            .replace(",",".")
    );

    const categoria =
        document.getElementById("categoriaCorrecaoVendedor").value;

    if(isNaN(novoValor) || novoValor < 0){
        alert("Digite um valor válido.");
        return;
    }

    const valorAtual = Number(vendas[vendedor] || 0);
    const diferenca = novoValor - valorAtual;

    vendas[vendedor] = novoValor;

    if(
        categoria === "semanaAtual" &&
        semanaAtual[vendedor] !== undefined
    ){
        semanaAtual[vendedor] =
            Number(semanaAtual[vendedor] || 0) + diferenca;
    }

    salvarDados();
    atualizarDashboard();

    campo.value = "";

    alert("Valor corrigido com sucesso.");
}

function atualizarDashboard(){
    let total = Object.values(vendas)
        .reduce((a,b)=>a + Number(b || 0), 0);

    total += Number(correcaoTotalGeral || 0);

    let pct = percentual(total, META_LOJA);

    document.getElementById("dataHora").innerText =
        agoraBrasilia().toLocaleString("pt-BR") + " • Brasília";

    document.getElementById("totalLoja").innerText =
        formatar(total);

    document.getElementById("percentLoja").innerText =
        pct + "%";

    document.getElementById("barraLoja").style.width =
        Math.min(Number(pct), 100) + "%";

    document.getElementById("metaInfo").innerHTML =
        `Faltam R$ ${formatar(Math.max(0, META_LOJA-total))}`;

    atualizarMensal();
    atualizarSemanal();
    atualizarRanking();
}

function atualizarMensal(){
    let html = "";

    vendedores.forEach(nome=>{
        let valor = Number(vendas[nome] || 0);
        let pct = percentual(valor, META_MENSAL);

        html += `
        <div>${nome}: R$ ${formatar(valor)} (${pct}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(Number(pct),100)}%"></div>
        </div>`;
    });

    document.getElementById("performanceMensal").innerHTML = html;
}

function atualizarSemanal(){
    let html = "";

    vendedores.forEach(nome=>{
        let valor = Number(semanaAtual[nome] || 0);
        let pct = percentual(valor, META_SEMANAL);

        html += `
        <div>${nome}: R$ ${formatar(valor)} (${pct}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(Number(pct),100)}%"></div>
        </div>`;
    });

    document.getElementById("performanceSemanal").innerHTML = html;
}

function atualizarRanking(){
    let ranking = vendedores
        .map(v=>[v, Number(vendas[v] || 0)])
        .sort((a,b)=>b[1]-a[1]);

    let medals = ["🥇","🥈","🥉"];

    document.getElementById("ranking").innerHTML =
        ranking.map((r,i)=>`
        <div class="rank-item">
            <span>${medals[i]} ${r[0]}</span>
            <span>R$ ${formatar(r[1])}</span>
        </div>`).join("");
}

setInterval(()=>{
    document.getElementById("dataHora").innerText =
        agoraBrasilia().toLocaleString("pt-BR") + " • Brasília";
}, 1000);

atualizarDashboard();
</script>
</body>
</html>
