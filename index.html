<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Dashboard Premium V7</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:white;
    font-family:Arial,sans-serif;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    max-width:480px;
    margin:auto;
}

.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:18px;
}
.logo span{
    font-family:'Bring Race',sans-serif !important;
}

.white{color:white;}
.red{
    color:#ff0000;
    text-shadow:0 0 8px #ff0000;
}

.card{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,0.18);
    backdrop-filter:blur(12px);
}

h3{
    margin-bottom:12px;
}

input,select,button{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,select{
    background:rgba(0,0,0,0.35);
    color:white;
}

button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:white;
    font-weight:bold;
}

.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    overflow:hidden;
    margin:8px 0;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
    transition:0.5s;
}

.rank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}

.chart-day{
    margin:10px 0;
}

.chart-bar-bg{
    width:100%;
    height:12px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
}

.chart-bar{
    height:100%;
    border-radius:10px;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>

<div class="card">
<h3>Meta Geral da Loja</h3>
<div>Total: R$ <span id="totalLoja">0,00</span></div>
<div id="percentLoja">0%</div>
<div class="progress-container">
<div class="progress-bar" id="barraLoja"></div>
</div>
<div id="metaInfo"></div>
</div>

<div class="card">
<h3>Lançamento Diário</h3>

<select id="vendedor">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" inputmode="decimal" id="valorVendaDia" placeholder="Valor vendido no dia">

<button onclick="adicionarVendaDia()">Adicionar valor</button>
</div>

<div class="card">
<h3>Performance Mensal</h3>
<div id="performanceMensal"></div>
</div>

<div class="card">
<h3>Performance Semanal</h3>
<div id="performanceSemanal"></div>
</div>

<div class="card">
<h3>Histórico Semanal</h3>
<div id="graficoSemana"></div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<button onclick="gerarPDFDiario()">Relatório Diário</button>
<button onclick="gerarPDFMensal()">Relatório Mensal</button>
<button onclick="iniciarNovoMes()">Iniciar Novo Mês</button>

</div>

<script>
const META_LOJA=210000;
const META_MENSAL=70000;
const META_SEMANAL=17500;

const vendedores=["Joabe","João Gabriel","Fábio"];
const gerente="Caio Henrique";

let vendas=JSON.parse(localStorage.getItem("tazzoDashboard"))||{
    "Joabe":0,
    "João Gabriel":0,
    "Fábio":0,
    "Caio Henrique":0
};

let vendasDiarias=JSON.parse(localStorage.getItem("tazzoDiario"))||[];

function salvar(){
    localStorage.setItem("tazzoDashboard",JSON.stringify(vendas));
    localStorage.setItem("tazzoDiario",JSON.stringify(vendasDiarias));
}

function formatar(v){
    return v.toLocaleString("pt-BR",{minimumFractionDigits:2});
}

function percentual(v,m){
    return ((v/m)*100).toFixed(1);
}

function semanaAtual(){
    const d=new Date();
    const first=new Date(d.getFullYear(),0,1);
    return Math.ceil((((d-first)/86400000)+first.getDay()+1)/7);
}

function adicionarVendaDia(){
    let nome=document.getElementById("vendedor").value;

    let valorTexto=document.getElementById("valorVendaDia").value
        .replace(/\./g,"")
        .replace(",", ".");

    let valor=parseFloat(valorTexto);

    if(isNaN(valor)||valor<=0)return;

    vendas[nome]+=valor;

    vendasDiarias.push({
        vendedor:nome,
        valor,
        data:new Date().toLocaleDateString("pt-BR"),
        semana:semanaAtual(),
        diaSemana:new Date().getDay()
    });

    document.getElementById("valorVendaDia").value="";
    atualizarDashboard();
}

function atualizarDashboard(){
    atualizarMetaGeral();
    atualizarPerformanceMensal();
    atualizarPerformanceSemanal();
    atualizarRanking();
    atualizarGraficoSemana();
    salvar();
}

function atualizarMetaGeral(){
    let total=Object.values(vendas).reduce((a,b)=>a+b,0);

    let pct=percentual(total,META_LOJA);

    document.getElementById("totalLoja").innerText=formatar(total);
    document.getElementById("percentLoja").innerText=pct+"%";

    document.getElementById("barraLoja").style.width=pct+"%";

    let faltam=Math.max(0,META_LOJA-total);

    document.getElementById("metaInfo").innerHTML=
        `Faltam R$ ${formatar(faltam)} para a meta`;
}

function atualizarPerformanceMensal(){
    let html="";

    vendedores.forEach(nome=>{
        let valor=vendas[nome];
        let pct=percentual(valor,META_MENSAL);

        html+=`
            <div style="margin-bottom:14px;">
                <div>${nome}: R$ ${formatar(valor)} (${pct}%)</div>
                <div class="progress-container">
                    <div class="progress-bar" style="width:${pct}%"></div>
                </div>
            </div>
        `;
    });

    document.getElementById("performanceMensal").innerHTML=html;
}

function atualizarPerformanceSemanal(){
    let semana=semanaAtual();

    let html="";

    vendedores.forEach(nome=>{
        let total=vendasDiarias
            .filter(v=>v.vendedor===nome && v.semana===semana)
            .reduce((a,b)=>a+b.valor,0);

        let pct=percentual(total,META_SEMANAL);

        html+=`
            <div style="margin-bottom:14px;">
                <div>${nome}: R$ ${formatar(total)} (${pct}%)</div>
                <div class="progress-container">
                    <div class="progress-bar" style="width:${pct}%"></div>
                </div>
            </div>
        `;
    });

    document.getElementById("performanceSemanal").innerHTML=html;
}

function atualizarRanking(){
    let ranking=vendedores
        .map(v=>[v,vendas[v]])
        .sort((a,b)=>b[1]-a[1]);

    let medals=["🥇","🥈","🥉"];

    let html="";

    ranking.forEach((item,index)=>{
        html+=`
        <div class="rank-item">
            <span>${medals[index]} ${item[0]}</span>
            <span>R$ ${formatar(item[1])}</span>
        </div>`;
    });

    document.getElementById("ranking").innerHTML=html;
}

function atualizarGraficoSemana(){
    let dias=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
    let totais=[0,0,0,0,0,0,0];

    vendasDiarias.forEach(v=>{
        totais[v.diaSemana]+=v.valor;
    });

    let maior=Math.max(...totais,1);

    let html="";

    dias.forEach((dia,index)=>{
        let largura=(totais[index]/maior)*100;

        html+=`
        <div class="chart-day">
            <div>${dia} • R$ ${formatar(totais[index])}</div>
            <div class="chart-bar-bg">
                <div class="chart-bar" style="width:${largura}%"></div>
            </div>
        </div>`;
    });

    document.getElementById("graficoSemana").innerHTML=html;
}

function iniciarNovoMes(){
    if(!confirm("Deseja iniciar um novo mês?")) return;

    vendas={
        "Joabe":0,
        "João Gabriel":0,
        "Fábio":0,
        "Caio Henrique":0
    };

    vendasDiarias=[];

    atualizarDashboard();
}

function gerarPDFDiario(){
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF();

    const hoje=new Date().toLocaleDateString("pt-BR");

    pdf.setFontSize(24);
    pdf.text("TAZZO",105,20,{align:"center"});
    pdf.setFontSize(16);
    pdf.text("Relatório Diário",105,30,{align:"center"});

    let y=50;

    vendasDiarias
        .filter(v=>v.data===hoje)
        .forEach(item=>{
            pdf.text(`${item.vendedor}: R$ ${formatar(item.valor)}`,20,y);
            y+=15;
        });

    pdf.save("relatorio-diario.pdf");
}

function gerarPDFMensal(){
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF();

    pdf.setFontSize(24);
    pdf.text("TAZZO",105,20,{align:"center"});
    pdf.setFontSize(16);
    pdf.text("Relatório Mensal",105,30,{align:"center"});

    let y=50;

    Object.entries(vendas).forEach(item=>{
        pdf.text(`${item[0]}: R$ ${formatar(item[1])}`,20,y);
        y+=15;
    });

    pdf.save("relatorio-mensal.pdf");
}

atualizarDashboard();
</script>

</body>
</html>
