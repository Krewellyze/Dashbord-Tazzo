<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Dashboard Premium V13.7.2 REALTIME</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:#fff;
    font-family:Arial,sans-serif;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
.container{max-width:480px;margin:auto}
.logo{text-align:center;font-size:42px;margin-bottom:18px}
.logo span{font-family:'Bring Race',sans-serif !important}
.white{color:#fff}
.red{color:#ff0000;text-shadow:0 0 8px #ff0000}

.card{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,.18);
    backdrop-filter:blur(12px);
}

button,input,select{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,select{
    background:rgba(0,0,0,.35);
    color:#fff;
}

button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    overflow:hidden;
    margin:8px 0;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
}

.rank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}

#painelGerente{display:none}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>

<div class="card">
<h3>Meta Geral da Loja</h3>
<div>Total: R$ <span id="totalLoja">0,00</span></div>
<div id="percentLoja">0%</div>
<div class="progress-container">
<div class="progress-bar" id="barraLoja"></div>
</div>
<div id="metaInfo"></div>
</div>

<div class="card">
<h3>Performance Mensal</h3>
<div id="performanceMensal"></div>
</div>

<div class="card">
<h3>Performance Semanal</h3>
<div id="performanceSemanal"></div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<button onclick="abrirLoginGerente()">Acesso Gerente</button>

<div id="painelGerente" class="card">

<h3>Painel do Gerente</h3>

<h4>Lançar Venda</h4>
<select id="vendedorVenda">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" id="valorVendaDia" placeholder="Valor">
<button onclick="adicionarVenda()">Adicionar</button>

<hr>

<h4>Correção</h4>
<select id="vendedorCorrecao">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" id="novoValorVendedor" placeholder="Novo valor">
<button onclick="corrigir()">Salvar</button>

<button onclick="logoutGerente()">Sair</button>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwKI2tgh4mqvRu-bkzH6Cmr0VpfyHMaFMDn9BtWMYFsOsigDMSp3Z-7veJO569mh78/exec";

const META_LOJA=210000;
const META_MENSAL=70000;
const META_SEMANAL=17500;

const vendedores=["Joabe","João Gabriel","Fábio","Caio Henrique"];

let vendas={};
let semanaAtual={};

function abrirLoginGerente(){
    if(prompt("Senha:")==="gerentazzo"){
        document.getElementById("painelGerente").style.display="block";
    }
}

function logoutGerente(){
    document.getElementById("painelGerente").style.display="none";
}

function formatar(v){
    return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2});
}

function percentual(v,m){
    return ((v/m)*100).toFixed(1);
}

// 🔥 BUSCA REAL DO GOOGLE SHEETS
async function carregar(){
    const res=await fetch(API_URL);
    const dados=await res.json();

    vendas={};
    semanaAtual={};

    vendedores.forEach(v=>{
        vendas[v]=0;
        semanaAtual[v]=0;
    });

    dados.slice(1).forEach(l=>{
        const vendedor=l[0];
        const valor=parseFloat(l[1])||0;

        if(vendas[vendedor]!=undefined){
            vendas[vendedor]+=valor;
            semanaAtual[vendedor]+=valor;
        }
    });

    atualizar();
}

// 🔥 ENVIA PRO GS (PERSISTE DE VERDADE)
async function adicionarVenda(){
    const vendedor=document.getElementById("vendedorVenda").value;
    const valor=parseFloat(document.getElementById("valorVendaDia").value.replace(",","."));

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            vendedor:vendedor,
            valor:valor
        })
    });

    document.getElementById("valorVendaDia").value="";
    carregar();
}

async function corrigir(){
    const vendedor=document.getElementById("vendedorCorrecao").value;
    const valor=parseFloat(document.getElementById("novoValorVendedor").value.replace(",","."));

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"corrigir",
            vendedor:vendedor,
            valor:valor
        })
    });

    carregar();
}

// UI
function atualizar(){

    let total=0;
    let htmlMensal="";
    let htmlSemanal="";

    vendedores.forEach(v=>{
        let val=vendas[v]||0;
        total+=val;

        let pct=percentual(val,META_MENSAL);

        htmlMensal+=`
        <div>${v}: R$ ${formatar(val)} (${pct}%)</div>
        <div class="progress-container">
        <div class="progress-bar" style="width:${pct}%"></div>
        </div>`;

        htmlSemanal+=`
        <div>${v}: R$ ${formatar(val)} (${pct}%)</div>
        <div class="progress-container">
        <div class="progress-bar" style="width:${pct}%"></div>
        </div>`;
    });

    let pctLoja=percentual(total,META_LOJA);

    document.getElementById("totalLoja").innerText=formatar(total);
    document.getElementById("percentLoja").innerText=pctLoja+"%";
    document.getElementById("barraLoja").style.width=pctLoja+"%";

    document.getElementById("performanceMensal").innerHTML=htmlMensal;
    document.getElementById("performanceSemanal").innerHTML=htmlSemanal;

    atualizarRanking();
}

function atualizarRanking(){
    let ranking=Object.entries(vendas)
        .sort((a,b)=>b[1]-a[1]);

    document.getElementById("ranking").innerHTML=
        ranking.map((r,i)=>`
        <div class="rank-item">
        <span>${i+1}º ${r[0]}</span>
        <span>R$ ${formatar(r[1])}</span>
        </div>`).join("");
}

// 🔥 TEMPO REAL GLOBAL
setInterval(carregar,5000);
carregar();

</script>

</body>
</html>
