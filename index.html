<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Dashboard Premium V11</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:#fff;
    font-family:Arial,sans-serif;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
.container{max-width:480px;margin:auto}
.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:18px;
}
.logo span{
    font-family:'Bring Race',sans-serif !important;
}
.white{color:#fff}
.red{color:#ff0000;text-shadow:0 0 8px #ff0000}
.data-brasilia{
    text-align:center;
    font-size:13px;
    color:#ddd;
    margin-bottom:16px;
}
.card{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,.18);
    backdrop-filter:blur(12px);
}
button,input,select{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}
input,select{
    background:rgba(0,0,0,.35);
    color:#fff;
}
button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:#fff;
    font-weight:bold;
}
.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    overflow:hidden;
    margin:8px 0;
}
.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
    transition:.5s;
}
.rank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>

<div id="dataHora" class="data-brasilia"></div>

<div class="card">
<h3>Meta Geral da Loja</h3>
<div>Total: R$ <span id="totalLoja">0,00</span></div>
<div id="percentLoja">0%</div>
<div class="progress-container">
<div class="progress-bar" id="barraLoja"></div>
</div>
<div id="metaInfo"></div>
</div>

<div class="card">
<h3>Lançamento Diário</h3>
<select id="vendedor">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>
<input type="text" inputmode="decimal" id="valorVendaDia" placeholder="Valor vendido no dia">
<button onclick="adicionarVendaDia()">Adicionar valor</button>
</div>

<div class="card">
<h3>Performance Mensal</h3>
<div id="performanceMensal"></div>
</div>

<div class="card">
<h3>Performance Semanal</h3>
<div id="performanceSemanal"></div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<button onclick="gerarPDFDiario()">Relatório Diário</button>
<button onclick="gerarPDFMensal()">Relatório Mensal</button>
<button onclick="iniciarNovoMes()">Iniciar Novo Mês</button>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwKI2tgh4mqvRu-bkzH6Cmr0VpfyHMaFMDn9BtWMYFsOsigDMSp3Z-7veJO569mh78/exec";

const META_LOJA=210000;
const META_MENSAL=70000;
const META_SEMANAL=17500;
const vendedores=["Joabe","João Gabriel","Fábio"];

let vendas={
    "Fábio":0,
    "Joabe":0,
    "João Gabriel":0,
    "Caio Henrique":0
};

let semanaAtual={
    "Joabe":0,
    "João Gabriel":0,
    "Fábio":0
};

let vendasDiarias=[];

function agoraBrasilia(){
    return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
}

function dataHojeBR(){
    return agoraBrasilia().toLocaleDateString("pt-BR");
}

function formatar(v){
    return Number(v).toLocaleString("pt-BR",{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function percentual(v,m){
    return ((v/m)*100).toFixed(1);
}

async function carregarPlanilha(){
    try{
        const response=await fetch(API_URL);
        const dados=await response.json();

        vendas={
            "Fábio":0,
            "Joabe":0,
            "João Gabriel":0,
            "Caio Henrique":0
        };

        semanaAtual={
            "Joabe":0,
            "João Gabriel":0,
            "Fábio":0
        };

        vendasDiarias=[];

        dados.slice(1).forEach(linha=>{
            const vendedor=linha[0];
            const valor=parseFloat(String(linha[1]).replace(",", ".")) || 0;

            vendas[vendedor]=(vendas[vendedor]||0)+valor;

            if(vendedores.includes(vendedor)){
                semanaAtual[vendedor]+=valor;
            }

            vendasDiarias.push({
                vendedor,
                valor,
                data:linha[2]
            });
        });

        atualizarDashboard();

    }catch(error){
        console.error("Erro ao carregar planilha:",error);
    }
}

async function adicionarVendaDia(){
    let nome=document.getElementById("vendedor").value;

    let valor=parseFloat(
        document.getElementById("valorVendaDia").value
        .replace(/\./g,"")
        .replace(",",".")
    );

    if(isNaN(valor)||valor<=0)return;

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            vendedor:nome,
            valor:valor
        })
    });

    document.getElementById("valorVendaDia").value="";

    carregarPlanilha();
}

function atualizarDashboard(){
    let total=
        (vendas["Fábio"]||0)+
        (vendas["Joabe"]||0)+
        (vendas["João Gabriel"]||0)+
        (vendas["Caio Henrique"]||0);

    let pct=percentual(total,META_LOJA);

    document.getElementById("dataHora").innerText=
        agoraBrasilia().toLocaleString("pt-BR")+" • Brasília";

    document.getElementById("totalLoja").innerText=formatar(total);
    document.getElementById("percentLoja").innerText=pct+"%";
    document.getElementById("barraLoja").style.width=Math.min(pct,100)+"%";

    document.getElementById("metaInfo").innerHTML=
        `Faltam R$ ${formatar(Math.max(0,META_LOJA-total))}`;

    atualizarMensal();
    atualizarSemanal();
    atualizarRanking();
}

function atualizarMensal(){
    let html="";

    vendedores.forEach(nome=>{
        let valor=vendas[nome]||0;
        let pct=percentual(valor,META_MENSAL);

        html+=`
        <div>${nome}: R$ ${formatar(valor)} (${pct}%)</div>
        <div class="progress-container">
        <div class="progress-bar" style="width:${Math.min(pct,100)}%"></div>
        </div>`;
    });

    document.getElementById("performanceMensal").innerHTML=html;
}

function atualizarSemanal(){
    let html="";

    vendedores.forEach(nome=>{
        let valor=semanaAtual[nome]||0;
        let pct=percentual(valor,META_SEMANAL);

        html+=`
        <div>${nome}: R$ ${formatar(valor)} (${pct}%)</div>
        <div class="progress-container">
        <div class="progress-bar" style="width:${Math.min(pct,100)}%"></div>
        </div>`;
    });

    document.getElementById("performanceSemanal").innerHTML=html;
}

function atualizarRanking(){
    let ranking=vendedores
        .map(v=>[v,vendas[v]||0])
        .sort((a,b)=>b[1]-a[1]);

    let medals=["🥇","🥈","🥉"];

    document.getElementById("ranking").innerHTML=
        ranking.map((r,i)=>`
        <div class="rank-item">
        <span>${medals[i]} ${r[0]}</span>
        <span>R$ ${formatar(r[1])}</span>
        </div>`).join("");
}

function gerarPDFDiario(){
    alert("Relatório premium mantido");
}

function gerarPDFMensal(){
    alert("Relatório premium mantido");
}

function iniciarNovoMes(){
    alert("Para iniciar novo mês, limpe os registros da planilha.");
}

setInterval(carregarPlanilha,10000);
carregarPlanilha();
</script>

</body>
</html>
