<script>
const API_URL="SUA_URL_DO_APPS_SCRIPT_AQUI";
const SENHA_GERENTE="gerentazzo";

const META_LOJA=210000;
const META_MENSAL=70000;
const META_SEMANAL=17500;

const vendedores=["Joabe","João Gabriel","Fábio","Caio Henrique"];

let dashboardData={
    vendas:{},
    semanaAtual:{},
    correcoes:{
        mensal:{},
        semanal:{},
        totalLoja:null
    }
};

function abrirLoginGerente(){
    const senha=prompt("Digite a senha:");
    if(senha===SENHA_GERENTE){
        document.getElementById("painelGerente").style.display="block";
    }else{
        alert("Senha incorreta");
    }
}

function logoutGerente(){
    document.getElementById("painelGerente").style.display="none";
}

async function carregarDados(){
    try{
        const response=await fetch(API_URL + "?action=dashboard");
        dashboardData=await response.json();

        atualizarDashboard();
    }catch(e){
        console.error("Erro ao carregar:",e);
    }
}

async function salvarDados(payload){
    try{
        await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify(payload)
        });

        await carregarDados();
    }catch(e){
        console.error("Erro ao salvar:",e);
    }
}

function adicionarVendaDia(){
    const vendedor=document.getElementById("vendedorVenda").value;

    const valor=parseFloat(
        document.getElementById("valorVendaDia").value
            .replace(/\./g,"")
            .replace(",",".")
    );

    if(isNaN(valor)||valor<=0){
        alert("Valor inválido");
        return;
    }

    salvarDados({
        action:"adicionarVenda",
        vendedor,
        valor
    });

    document.getElementById("valorVendaDia").value="";
}

function corrigirMetaLoja(){
    const valor=parseFloat(
        document.getElementById("novoTotalLoja").value
            .replace(/\./g,"")
            .replace(",",".")
    );

    salvarDados({
        action:"corrigirMetaLoja",
        valor
    });
}

function corrigirValorVendedor(){
    const vendedor=document.getElementById("vendedorCorrecao").value;

    const valor=parseFloat(
        document.getElementById("novoValorVendedor").value
            .replace(/\./g,"")
            .replace(",",".")
    );

    const categoria=document.getElementById("categoriaCorrecao").value;

    salvarDados({
        action:"corrigir",
        vendedor,
        valor,
        categoria
    });
}

function formatar(v){
    return Number(v||0).toLocaleString("pt-BR",{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function percentual(v,m){
    return ((v/m)*100).toFixed(1);
}

function atualizarDashboard(){
    let total=0;
    let mensalHTML="";
    let semanalHTML="";

    vendedores.forEach(nome=>{
        const mensal=
            dashboardData.correcoes?.mensal?.[nome]
            ?? dashboardData.vendas?.[nome]
            ?? 0;

        const semanal=
            dashboardData.correcoes?.semanal?.[nome]
            ?? dashboardData.semanaAtual?.[nome]
            ?? 0;

        total+=mensal;

        const pctMensal=percentual(mensal,META_MENSAL);
        const pctSemanal=percentual(semanal,META_SEMANAL);

        mensalHTML+=`
        <div>${nome}: R$ ${formatar(mensal)} (${pctMensal}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(pctMensal,100)}%"></div>
        </div>`;

        semanalHTML+=`
        <div>${nome}: R$ ${formatar(semanal)} (${pctSemanal}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(pctSemanal,100)}%"></div>
        </div>`;
    });

    const totalFinal=
        dashboardData.correcoes?.totalLoja ?? total;

    const pctLoja=percentual(totalFinal,META_LOJA);

    document.getElementById("totalLoja").innerText=formatar(totalFinal);
    document.getElementById("percentLoja").innerText=pctLoja+"%";
    document.getElementById("barraLoja").style.width=
        Math.min(pctLoja,100)+"%";

    document.getElementById("metaInfo").innerHTML=
        `Faltam R$ ${formatar(Math.max(0,META_LOJA-totalFinal))}`;

    document.getElementById("performanceMensal").innerHTML=mensalHTML;
    document.getElementById("performanceSemanal").innerHTML=semanalHTML;

    atualizarRanking();
}

function atualizarRanking(){
    const ranking=vendedores.map(nome=>{
        const valor=
            dashboardData.correcoes?.mensal?.[nome]
            ?? dashboardData.vendas?.[nome]
            ?? 0;

        return [nome,valor];
    }).sort((a,b)=>b[1]-a[1]);

    document.getElementById("ranking").innerHTML=
        ranking.map((r,i)=>`
        <div class="rank-item">
            <span>${i+1}º ${r[0]}</span>
            <span>R$ ${formatar(r[1])}</span>
        </div>
        `).join("");
}

setInterval(carregarDados,3000);
carregarDados();
</script>
