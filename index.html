<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Dashboard Premium V13.2</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:#fff;
    font-family:Arial,sans-serif;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
.container{max-width:480px;margin:auto}
.logo{text-align:center;font-size:42px;margin-bottom:18px}
.logo span{font-family:'Bring Race',sans-serif !important}
.white{color:#fff}
.red{color:#ff0000;text-shadow:0 0 8px #ff0000}
.data-brasilia{text-align:center;font-size:13px;color:#ddd;margin-bottom:16px}
.card{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,.18);
    backdrop-filter:blur(12px);
}
button,input,select{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}
input,select{
    background:rgba(0,0,0,.35);
    color:#fff;
}
button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}
.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    overflow:hidden;
    margin:8px 0;
}
.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
}
.rank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}
.lancamento-item{
    padding:10px;
    margin:8px 0;
    background:rgba(255,255,255,.05);
    border-radius:10px;
}
#painelGerente{display:none}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>

<div id="dataHora" class="data-brasilia"></div>

<div class="card">
<h3>Meta Geral da Loja</h3>
<div>Total: R$ <span id="totalLoja">0,00</span></div>
<div id="percentLoja">0%</div>
<div class="progress-container">
<div class="progress-bar" id="barraLoja"></div>
</div>
<div id="metaInfo"></div>
</div>

<div class="card">
<h3>Performance Mensal</h3>
<div id="performanceMensal"></div>
</div>

<div class="card">
<h3>Performance Semanal</h3>
<div id="performanceSemanal"></div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<button onclick="abrirLoginGerente()">Acesso Gerente</button>

<div id="painelGerente" class="card">
<h3>Painel do Gerente</h3>

<select id="vendedor">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" id="valorVendaDia" placeholder="Valor vendido no dia">

<button onclick="adicionarVendaDia()">Adicionar valor</button>

<h3>Últimos lançamentos</h3>
<div id="listaLancamentos"></div>

<button onclick="gerarPDFDiario()">Relatório Diário</button>
<button onclick="gerarPDFMensal()">Relatório Mensal</button>
<button onclick="logoutGerente()">Sair</button>
</div>

</div>

<script>
const API_URL="COLE_AQUI_SUA_URL_GS";
const SENHA_GERENTE="gerentazzo";

const META_LOJA=210000;
const META_MENSAL=70000;
const META_SEMANAL=17500;

const vendedores=["Joabe","João Gabriel","Fábio","Caio Henrique"];

let dashboardData={
    vendas:{},
    semanaAtual:{},
    correcoes:{
        mensal:{},
        semanal:{},
        totalLoja:null
    }
};

function abrirLoginGerente(){
    const senha=prompt("Digite a senha:");
    if(senha===SENHA_GERENTE){
        document.getElementById("painelGerente").style.display="block";
    }else{
        alert("Senha incorreta");
    }
}

function logoutGerente(){
    document.getElementById("painelGerente").style.display="none";
}

async function carregarDados(){
    try{
        const response=await fetch(API_URL+"?action=dashboard");
        dashboardData=await response.json();

        atualizarDashboard();
    }catch(erro){
        console.error("Erro ao carregar",erro);
    }
}

async function salvarDados(payload){
    try{
        await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify(payload)
        });

        await carregarDados();
    }catch(erro){
        console.error("Erro ao salvar",erro);
    }
}

function adicionarVendaDia(){
    const vendedor=document.getElementById("vendedorVenda").value;

    const valor=parseFloat(
        document.getElementById("valorVendaDia").value
            .replace(/\./g,"")
            .replace(",",".")
    );

    if(isNaN(valor)||valor<=0){
        alert("Valor inválido");
        return;
    }

    salvarDados({
        action:"adicionarVenda",
        vendedor:vendedor,
        valor:valor
    });

    document.getElementById("valorVendaDia").value="";
    alert("Venda adicionada com sucesso");
}

function corrigirMetaLoja(){
    const valor=parseFloat(
        document.getElementById("novoTotalLoja").value
            .replace(/\./g,"")
            .replace(",",".")
    );

    if(isNaN(valor)||valor<0){
        alert("Valor inválido");
        return;
    }

    salvarDados({
        action:"corrigirMetaLoja",
        valor:valor
    });

    alert("Meta geral corrigida com sucesso");
}

function corrigirValorVendedor(){
    const vendedor=
        document.getElementById("vendedorCorrecao").value;

    const categoria=
        document.getElementById("categoriaCorrecao").value;

    const valor=parseFloat(
        document.getElementById("novoValorVendedor").value
            .replace(/\./g,"")
            .replace(",",".")
    );

    if(isNaN(valor)||valor<0){
        alert("Valor inválido");
        return;
    }

    salvarDados({
        action:"corrigir",
        vendedor:vendedor,
        categoria:categoria,
        valor:valor
    });

    alert("Correção salva com sucesso");
}

function formatar(v){
    return Number(v||0).toLocaleString("pt-BR",{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function percentual(v,m){
    return ((v/m)*100).toFixed(1);
}

function atualizarDashboard(){
    let total=0;
    let mensalHTML="";
    let semanalHTML="";

    vendedores.forEach(nome=>{

        let mensal=
            dashboardData.correcoes?.mensal?.[nome]
            ?? dashboardData.vendas?.[nome]
            ?? 0;

        let semanal=
            dashboardData.correcoes?.semanal?.[nome]
            ?? dashboardData.semanaAtual?.[nome]
            ?? 0;

        total+=mensal;

        let pctMensal=percentual(mensal,META_MENSAL);
        let pctSemanal=percentual(semanal,META_SEMANAL);

        mensalHTML+=`
        <div>${nome}: R$ ${formatar(mensal)} (${pctMensal}%)</div>
        <div class="progress-container">
            <div class="progress-bar"
            style="width:${Math.min(Number(pctMensal),100)}%">
            </div>
        </div>`;

        semanalHTML+=`
        <div>${nome}: R$ ${formatar(semanal)} (${pctSemanal}%)</div>
        <div class="progress-container">
            <div class="progress-bar"
            style="width:${Math.min(Number(pctSemanal),100)}%">
            </div>
        </div>`;
    });

    let totalFinal=
        dashboardData.correcoes?.totalLoja ?? total;

    let pctLoja=percentual(totalFinal,META_LOJA);

    document.getElementById("totalLoja").innerText=
        formatar(totalFinal);

    document.getElementById("percentLoja").innerText=
        pctLoja+"%";

    document.getElementById("barraLoja").style.width=
        Math.min(Number(pctLoja),100)+"%";

    document.getElementById("metaInfo").innerHTML=
        `Faltam R$ ${formatar(
            Math.max(0,META_LOJA-totalFinal)
        )}`;

    document.getElementById("performanceMensal").innerHTML=
        mensalHTML;

    document.getElementById("performanceSemanal").innerHTML=
        semanalHTML;

    atualizarRanking();
}

function atualizarRanking(){
    let ranking=vendedores.map(nome=>{
        let valor=
            dashboardData.correcoes?.mensal?.[nome]
            ?? dashboardData.vendas?.[nome]
            ?? 0;

        return [nome,valor];
    }).sort((a,b)=>b[1]-a[1]);

    document.getElementById("ranking").innerHTML=
        ranking.map((r,i)=>`
        <div class="rank-item">
            <span>${i+1}º ${r[0]}</span>
            <span>R$ ${formatar(r[1])}</span>
        </div>
        `).join("");
}

function gerarPDFDiario(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(24);
    doc.text("TAZZO",85,15);

    doc.setFontSize(14);
    doc.text("Relatório Diário Premium",60,25);

    let y=40;

    vendedores.forEach(nome=>{
        let valor=
            dashboardData.correcoes?.mensal?.[nome]
            ?? dashboardData.vendas?.[nome]
            ?? 0;

        doc.text(
            `${nome}: R$ ${formatar(valor)}`,
            20,y
        );

        y+=10;
    });

    doc.save("relatorio_diario_tazzo.pdf");
}

function gerarPDFMensal(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(24);
    doc.text("TAZZO",85,15);

    doc.setFontSize(14);
    doc.text("Relatório Mensal Premium",60,25);

    let y=40;

    vendedores.forEach(nome=>{
        let mensal=
            dashboardData.correcoes?.mensal?.[nome]
            ?? dashboardData.vendas?.[nome]
            ?? 0;

        let semanal=
            dashboardData.correcoes?.semanal?.[nome]
            ?? dashboardData.semanaAtual?.[nome]
            ?? 0;

        doc.text(
            `${nome}: M ${formatar(mensal)} | S ${formatar(semanal)}`,
            20,y
        );

        y+=10;
    });

    doc.save("relatorio_mensal_tazzo.pdf");
}

setInterval(carregarDados,3000);
carregarDados();
</script>

</body>
</html>
