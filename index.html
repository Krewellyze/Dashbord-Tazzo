<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Dashboard Premium V13.8 FINAL STABLE</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:#fff;
    font-family:Arial,sans-serif;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{max-width:480px;margin:auto}
.logo{text-align:center;font-size:42px;margin-bottom:18px}
.logo span{font-family:'Bring Race',sans-serif !important}
.white{color:#fff}
.red{color:#ff0000;text-shadow:0 0 8px #ff0000}

.card{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,.18);
    backdrop-filter:blur(12px);
}

button,input,select{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,select{
    background:rgba(0,0,0,.35);
    color:#fff;
}

button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    overflow:hidden;
    margin:8px 0;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
}

.rank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}

#painelGerente{display:none}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>

<div class="card">
<h3>Meta Geral da Loja</h3>
<div>Total: R$ <span id="totalLoja">0,00</span></div>
<div id="percentLoja">0%</div>
<div class="progress-container">
<div class="progress-bar" id="barraLoja"></div>
</div>
<div id="metaInfo"></div>
</div>

<div class="card">
<h3>Performance Mensal</h3>
<div id="performanceMensal"></div>
</div>

<div class="card">
<h3>Performance Semanal</h3>
<div id="performanceSemanal"></div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<button onclick="abrirLoginGerente()">Acesso Gerente</button>

<div id="painelGerente" class="card">
<h3>Painel do Gerente</h3>

<h4>Lançar Venda do Dia</h4>
<select id="vendedorVenda">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" id="valorVendaDia" placeholder="Valor vendido no dia">
<button onclick="adicionarVendaDia()">Adicionar valor</button>

<hr style="margin:15px 0">

<h4>Correção Real de Valores</h4>
<select id="vendedorCorrecao">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" id="novoValorVendedor" placeholder="Novo valor correto">

<select id="categoriaCorrecao">
<option value="mensal">Mensal</option>
<option value="semanal">Semanal</option>
</select>

<button onclick="corrigirValorVendedor()">Salvar Correção</button>

<button onclick="logoutGerente()">Sair</button>
</div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyXvOYD3kK3-W-FQS6pC776r1s40IFRpQIDM51azpQYc5tf8yJXhiOzDVNKYPtO3ak/exec";

const SENHA_GERENTE="gerentazzo";
const META_LOJA=210000;
const META_MENSAL=70000;
const META_SEMANAL=17500;

let dados=[];

function formatar(v){
    return Number(v).toLocaleString("pt-BR",{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function percentual(v,m){
    return ((v/m)*100).toFixed(1);
}

async function carregarDados(){
    const response=await fetch(API_URL+"?t="+Date.now());
    dados=await response.json();
    atualizarDashboard();
}

function abrirLoginGerente(){
    const senha=prompt("Digite a senha:");
    if(senha===SENHA_GERENTE){
        document.getElementById("painelGerente").style.display="block";
    }else{
        alert("Senha incorreta");
    }
}

function logoutGerente(){
    document.getElementById("painelGerente").style.display="none";
}

async function adicionarVendaDia(){
    const vendedor=document.getElementById("vendedorVenda").value;

    const valor=parseFloat(
        document.getElementById("valorVendaDia").value
        .replace(/\./g,"")
        .replace(",",".")
    );

    if(isNaN(valor)||valor<=0){
        alert("Valor inválido");
        return;
    }

    const atual=dados.find(d=>d.vendedor===vendedor);

    const mensal=(atual?.mensal||0)+valor;
    const semanal=(atual?.semanal||0)+valor;

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"editar",
            vendedor,
            mensal,
            semanal
        })
    });

    document.getElementById("valorVendaDia").value="";

    await carregarDados();

    alert("Venda adicionada com sucesso");
}

async function corrigirValorVendedor(){
    const vendedor=document.getElementById("vendedorCorrecao").value;
    const categoria=document.getElementById("categoriaCorrecao").value;

    const valor=parseFloat(
        document.getElementById("novoValorVendedor").value
        .replace(/\./g,"")
        .replace(",",".")
    );

    if(isNaN(valor)){
        alert("Valor inválido");
        return;
    }

    const atual=dados.find(d=>d.vendedor===vendedor);

    let mensal=atual?.mensal||0;
    let semanal=atual?.semanal||0;

    if(categoria==="mensal"){
        mensal=valor;
    }else{
        semanal=valor;
    }

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"editar",
            vendedor,
            mensal,
            semanal
        })
    });

    document.getElementById("novoValorVendedor").value="";

    await carregarDados();

    alert("Correção aplicada");
}

function atualizarDashboard(){
    let total=0;
    let mensalHTML="";
    let semanalHTML="";

    const ranking=[...dados].sort((a,b)=>b.mensal-a.mensal);

    dados.forEach(item=>{
        total+=Number(item.mensal);

        const pctMensal=percentual(item.mensal,META_MENSAL);
        const pctSemanal=percentual(item.semanal,META_SEMANAL);

        mensalHTML+=`
        <div>${item.vendedor}: R$ ${formatar(item.mensal)} (${pctMensal}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(pctMensal,100)}%"></div>
        </div>`;

        semanalHTML+=`
        <div>${item.vendedor}: R$ ${formatar(item.semanal)} (${pctSemanal}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(pctSemanal,100)}%"></div>
        </div>`;
    });

    const pctLoja=percentual(total,META_LOJA);

    document.getElementById("totalLoja").innerText=formatar(total);
    document.getElementById("percentLoja").innerText=pctLoja+"%";
    document.getElementById("barraLoja").style.width=Math.min(pctLoja,100)+"%";
    document.getElementById("metaInfo").innerHTML=
        `Faltam R$ ${formatar(Math.max(0,META_LOJA-total))}`;

    document.getElementById("performanceMensal").innerHTML=mensalHTML;
    document.getElementById("performanceSemanal").innerHTML=semanalHTML;

    document.getElementById("ranking").innerHTML=
        ranking.map((r,i)=>`
        <div class="rank-item">
            <span>${i+1}º ${r.vendedor}</span>
            <span>R$ ${formatar(r.mensal)}</span>
        </div>
        `).join("");
}

setInterval(carregarDados,3000);

carregarDados();
</script>

</body>
</html>
