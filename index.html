<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Dashboard Premium V13.2</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:#fff;
    font-family:Arial,sans-serif;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
.container{max-width:480px;margin:auto}
.logo{text-align:center;font-size:42px;margin-bottom:18px}
.logo span{font-family:'Bring Race',sans-serif !important}
.white{color:#fff}
.red{color:#ff0000;text-shadow:0 0 8px #ff0000}
.data-brasilia{text-align:center;font-size:13px;color:#ddd;margin-bottom:16px}
.card{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,.18);
    backdrop-filter:blur(12px);
}
button,input,select{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}
input,select{
    background:rgba(0,0,0,.35);
    color:#fff;
}
button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}
.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    overflow:hidden;
    margin:8px 0;
}
.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
}
.rank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}
.lancamento-item{
    padding:10px;
    margin:8px 0;
    background:rgba(255,255,255,.05);
    border-radius:10px;
}
#painelGerente{display:none}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>

<div id="dataHora" class="data-brasilia"></div>

<div class="card">
<h3>Meta Geral da Loja</h3>
<div>Total: R$ <span id="totalLoja">0,00</span></div>
<div id="percentLoja">0%</div>
<div class="progress-container">
<div class="progress-bar" id="barraLoja"></div>
</div>
<div id="metaInfo"></div>
</div>

<div class="card">
<h3>Performance Mensal</h3>
<div id="performanceMensal"></div>
</div>

<div class="card">
<h3>Performance Semanal</h3>
<div id="performanceSemanal"></div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<button onclick="abrirLoginGerente()">Acesso Gerente</button>

<div id="painelGerente" class="card">
<h3>Painel do Gerente</h3>

<select id="vendedor">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" id="valorVendaDia" placeholder="Valor vendido no dia">

<button onclick="adicionarVendaDia()">Adicionar valor</button>

<h3>Últimos lançamentos</h3>
<div id="listaLancamentos"></div>

<button onclick="gerarPDFDiario()">Relatório Diário</button>
<button onclick="gerarPDFMensal()">Relatório Mensal</button>
<button onclick="logoutGerente()">Sair</button>
</div>

</div>

<script>
const SENHA_GERENTE="gerentazzo";
const API_URL="https://script.google.com/macros/s/AKfycbwKI2tgh4mqvRu-bkzH6Cmr0VpfyHMaFMDn9BtWMYFsOsigDMSp3Z-7veJO569mh78/exec";

const META_LOJA=210000;
const META_MENSAL=70000;
const META_SEMANAL=17500;
const vendedores=["Joabe","João Gabriel","Fábio"];

let vendas={};
let semanaAtual={};
let lancamentos=[];

function abrirLoginGerente(){
    const senha=prompt("Digite a senha do gerente:");
    if(senha===SENHA_GERENTE){
        localStorage.setItem("gerenteLogado","true");
        mostrarPainelGerente();
    }else{
        alert("Senha incorreta");
    }
}

function mostrarPainelGerente(){
    document.getElementById("painelGerente").style.display="block";
}

function verificarSessaoGerente(){
    if(localStorage.getItem("gerenteLogado")==="true"){
        mostrarPainelGerente();
    }
}

function logoutGerente(){
    localStorage.removeItem("gerenteLogado");
    document.getElementById("painelGerente").style.display="none";
}

function agoraBrasilia(){
    return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
}

function formatar(v){
    return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
}

function percentual(v,m){
    return ((v/m)*100).toFixed(1);
}

function inicioSemanaBrasilia(){
    const hoje=agoraBrasilia();
    const inicio=new Date(hoje);
    const dia=hoje.getDay();
    const diff=dia===0?6:dia-1;
    inicio.setDate(hoje.getDate()-diff);
    inicio.setHours(0,0,0,0);
    return inicio;
}

async function carregarPlanilha(){
    const response=await fetch(API_URL);
    const dados=await response.json();

    vendas={"Fábio":0,"Joabe":0,"João Gabriel":0,"Caio Henrique":0};
    semanaAtual={"Joabe":0,"João Gabriel":0,"Fábio":0};
    lancamentos=[];

    const inicioSemana=inicioSemanaBrasilia();

    dados.slice(1).forEach((linha,index)=>{
        const vendedor=linha[0];
        const valor=parseFloat(String(linha[1]).replace(",", "."))||0;
        const dataRegistro=linha[2];

        vendas[vendedor]=(vendas[vendedor]||0)+valor;

        const dataVenda=new Date(dataRegistro);

        if(vendedores.includes(vendedor) && !isNaN(dataVenda)){
            if(dataVenda>=inicioSemana){
                semanaAtual[vendedor]+=valor;
            }
        }

        lancamentos.push({
            row:index+2,
            vendedor,
            valor,
            data:dataRegistro
        });
    });

    atualizarDashboard();
    renderLancamentos();
    verificarMetaBatida();
}

async function adicionarVendaDia(){
    let nome = document.getElementById("vendedor").value;

    let valorTexto = document.getElementById("valorVendaDia").value.trim();

    let valor = parseFloat(
        valorTexto
            .replace(/\./g,"")
            .replace(",",".")
    );

    if(isNaN(valor) || valor <= 0){
        alert("Digite um valor válido.");
        return;
    }

    try{
        const response = await fetch(API_URL,{
            method:"POST",
            body: JSON.stringify({
                action:"add",
                vendedor:nome,
                valor:valor
            })
        });

        const resultado = await response.json();

        if(resultado.status === "ok"){
            document.getElementById("valorVendaDia").value = "";
            await carregarPlanilha();
            alert("Venda adicionada com sucesso.");
        }else{
            alert("Erro ao adicionar venda.");
        }

    }catch(error){
        console.error(error);
        alert("Erro de conexão com a planilha.");
    }
}

function renderLancamentos(){
    const lista=document.getElementById("listaLancamentos");

    lista.innerHTML=lancamentos.slice(-7).reverse().map(item=>`
        <div class="lancamento-item">
            ${item.vendedor} — R$ ${formatar(item.valor)}
            <br>
            <small>${item.data}</small>
        </div>
    `).join("");
}

function verificarMetaBatida(){
    const total=(vendas["Fábio"]||0)+(vendas["Joabe"]||0)+(vendas["João Gabriel"]||0)+(vendas["Caio Henrique"]||0);

    if(total>=META_LOJA && !localStorage.getItem("metaBatida")){
        alert("🎉 Meta geral da loja batida!");
        localStorage.setItem("metaBatida","true");
    }
}

function atualizarDashboard(){
    let total=(vendas["Fábio"]||0)+(vendas["Joabe"]||0)+(vendas["João Gabriel"]||0)+(vendas["Caio Henrique"]||0);

    let pct=percentual(total,META_LOJA);

    document.getElementById("dataHora").innerText=
        agoraBrasilia().toLocaleString("pt-BR")+" • Brasília";

    document.getElementById("totalLoja").innerText=formatar(total);
    document.getElementById("percentLoja").innerText=pct+"%";
    document.getElementById("barraLoja").style.width=Math.min(pct,100)+"%";
    document.getElementById("metaInfo").innerHTML=
        `Faltam R$ ${formatar(Math.max(0,META_LOJA-total))}`;

    atualizarMensal();
    atualizarSemanal();
    atualizarRanking();
}

function atualizarMensal(){
    let html="";
    vendedores.forEach(nome=>{
        let valor=vendas[nome]||0;
        let pct=percentual(valor,META_MENSAL);

        html+=`
        <div>${nome}: R$ ${formatar(valor)} (${pct}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(pct,100)}%"></div>
        </div>`;
    });

    document.getElementById("performanceMensal").innerHTML=html;
}

function atualizarSemanal(){
    let html="";
    vendedores.forEach(nome=>{
        let valor=semanaAtual[nome]||0;
        let pct=percentual(valor,META_SEMANAL);

        html+=`
        <div>${nome}: R$ ${formatar(valor)} (${pct}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(pct,100)}%"></div>
        </div>`;
    });

    document.getElementById("performanceSemanal").innerHTML=html;
}

function atualizarRanking(){
    let ranking=vendedores
        .map(v=>[v,vendas[v]||0])
        .sort((a,b)=>b[1]-a[1]);

    let medals=["🥇","🥈","🥉"];

    document.getElementById("ranking").innerHTML=
        ranking.map((r,i)=>`
        <div class="rank-item">
            <span>${medals[i]} ${r[0]}</span>
            <span>R$ ${formatar(r[1])}</span>
        </div>`).join("");
}

function gerarPDFDiario(){ alert("Relatório premium mantido"); }
function gerarPDFMensal(){ alert("Relatório premium mantido"); }

verificarSessaoGerente();
setInterval(carregarPlanilha,10000);
carregarPlanilha();
</script>

</body>
</html>
