<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Call Center V8 FINAL FIX</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:#fff;
    font-family:Arial,sans-serif;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{max-width:520px;margin:auto}

.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:18px;
}
.logo span{font-family:'Bring Race',sans-serif !important}
.white{color:#fff}
.red{color:#ff0000;text-shadow:0 0 8px #ff0000}

.card{
    background:rgba(255,255,255,.08);
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 0 15px rgba(255,0,0,.2);
}

.item{
    background:rgba(0,0,0,.5);
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>

<div class="card">
<h3>Resumo do Dia</h3>
<div id="resumo"></div>
</div>

<div class="card">
<h3>Ligações</h3>
<div id="lista"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxpj0nN8Hv6F7fAr8CgC9Vp9IQgEYkT6otLUCwJMK-JRty1u0H1EjjBlKBJ3tpw4hxs/exec";

let registros=[];

// 🔥 NORMALIZA DATA CORRETAMENTE
function dataBR(d){
    try{
        return new Date(d).toLocaleDateString("pt-BR");
    }catch{
        return "";
    }
}

function hoje(){
    return new Date().toLocaleDateString("pt-BR");
}

async function carregar(){
    const res=await fetch(API+"?t="+Date.now());
    registros=await res.json();
    render();
}

function render(){

    // ✅ FILTRO CORRETO
    let hojeLista = registros.filter(r=>{
        if(!r.data) return false;
        return dataBR(r.data) === hoje();
    });

    // 🔥 RESUMO
    const resumo={};

    hojeLista.forEach(r=>{
        if(!resumo[r.vendedor]){
            resumo[r.vendedor]={total:0,vendas:0};
        }

        resumo[r.vendedor].total++;

        if(r.converteu==="SIM"){
            resumo[r.vendedor].vendas++;
        }
    });

    const ranking = Object.entries(resumo).map(([v,d])=>{
        const taxa = d.total ? (d.vendas/d.total)*100 : 0;
        return {v, ...d, taxa};
    });

    // 🔥 CARDS RESUMO
    document.getElementById("resumo").innerHTML =
        ranking.map(r=>`
        <div class="item">
        <b>${r.v}</b><br>
        Ligações: ${r.total}<br>
        Vendas: ${r.vendas}<br>
        Conversão: ${r.taxa.toFixed(1)}%
        </div>
    `).join("") || "Sem registros hoje";

    // 🔥 LISTA DE LIGAÇÕES
    document.getElementById("lista").innerHTML =
        hojeLista.reverse().map(r=>`
        <div class="item">
        <b>${r.vendedor}</b><br>
        📅 ${dataBR(r.data)}<br>
        Cliente: ${r.cliente}<br>
        Tel: ${r.telefone}<br>
        Venda: ${r.converteu}
        </div>
    `).join("") || "Nenhuma ligação hoje";
}

setInterval(carregar,3000);
carregar();
</script>

</body>
</html>
