<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Dashboard Premium V13.8 FINAL REALTIME</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:#fff;
    font-family:Arial,sans-serif;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{max-width:480px;margin:auto}
.logo{text-align:center;font-size:42px;margin-bottom:18px}
.logo span{font-family:'Bring Race',sans-serif !important}
.white{color:#fff}
.red{color:#ff0000;text-shadow:0 0 8px #ff0000}

.card{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,.18);
    backdrop-filter:blur(12px);
}

button,input,select{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,select{
    background:rgba(0,0,0,.35);
    color:#fff;
}

button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    overflow:hidden;
    margin:8px 0;
}

.progress-bar{
    height:100%;
    width:0%;
    transition:width 0.8s ease, background 0.5s ease;
}

.rank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}

#painelGerente{display:none}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>

<div class="card">
<h3>Meta Geral da Loja</h3>
<div>Total: R$ <span id="totalLoja">0,00</span></div>
<div id="percentLoja">0%</div>
<div class="progress-container">
<div class="progress-bar" id="barraLoja"></div>
</div>
<div id="metaInfo"></div>
</div>

<div class="card">
<h3>Performance Mensal</h3>
<div id="performanceMensal"></div>
</div>

<div class="card">
<h3>Performance Semanal</h3>
<div id="performanceSemanal"></div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<button onclick="abrirLoginGerente()">Acesso Gerente</button>

<div id="painelGerente" class="card">
<h3>Painel do Gerente</h3>

<h4>Lançar Venda do Dia</h4>
<select id="vendedorVenda">
<option>Joabe</option>
<option>João Vitor</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" id="valorVendaDia" placeholder="Valor vendido no dia">
<button onclick="adicionarVendaDia()">Adicionar valor</button>

<hr style="margin:15px 0">

<h4>Correção de Valores</h4>
<select id="vendedorCorrecao">
<option>Joabe</option>
<option>João Vitor</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" id="novoValorVendedor" placeholder="Novo valor">

<select id="categoriaCorrecao">
<option value="mensal">Mensal</option>
<option value="semanal">Semanal</option>
</select>

<button onclick="corrigirValorVendedor()">Salvar Correção</button>

<hr style="margin:15px 0">

<h4>Correção Valor Geral</h4>
<input type="text" id="valorGeralManual" placeholder="Novo total geral">
<button onclick="corrigirValorGeral()">Salvar Total Geral</button>

<button onclick="logoutGerente()">Sair</button>
</div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyXvOYD3kK3-W-FQS6pC776r1s40IFRpQIDM51azpQYc5tf8yJXhiOzDVNKYPtO3ak/exec";

const SENHA_GERENTE="gerentazzo";
const META_LOJA=210000;
const META_MENSAL=70000;
const META_SEMANAL=17500;

let dados=[];
let totalManual=null;

function formatar(v){
    return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2});
}

function percentual(v,m){
    return ((v/m)*100);
}

function corBarra(pct){
    if(pct <= 35) return "#ff0000";
    if(pct <= 75) return "#ffd000";
    return "#00ff88";
}

async function carregarDados(){
    const response=await fetch(API_URL+"?t="+Date.now());
    const resultado=await response.json();

    dados=resultado.vendedores || [];
    totalManual=resultado.totalGeral;

    atualizarDashboard();
}

function abrirLoginGerente(){
    const senha=prompt("Digite a senha:");
    if(senha===SENHA_GERENTE){
        document.getElementById("painelGerente").style.display="block";
    }
}

function logoutGerente(){
    document.getElementById("painelGerente").style.display="none";
}

async function adicionarVendaDia(){
    const vendedor=document.getElementById("vendedorVenda").value;

    const valor=parseFloat(
        document.getElementById("valorVendaDia").value.replace(/\./g,"").replace(",",".")
    );

    const atual=dados.find(d=>d.vendedor===vendedor);

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"editar",
            vendedor,
            mensal:(atual?.mensal||0)+valor,
            semanal:(atual?.semanal||0)+valor
        })
    });

    document.getElementById("valorVendaDia").value="";
    carregarDados();
}

async function corrigirValorVendedor(){
    const vendedor=document.getElementById("vendedorCorrecao").value;
    const categoria=document.getElementById("categoriaCorrecao").value;

    const valor=parseFloat(
        document.getElementById("novoValorVendedor").value.replace(/\./g,"").replace(",",".")
    );

    const atual=dados.find(d=>d.vendedor===vendedor);

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"editar",
            vendedor,
            mensal: categoria==="mensal" ? valor : atual.mensal,
            semanal: categoria==="semanal" ? valor : atual.semanal
        })
    });

    document.getElementById("novoValorVendedor").value="";
    carregarDados();
}

async function corrigirValorGeral(){
    const valor=parseFloat(
        document.getElementById("valorGeralManual").value.replace(/\./g,"").replace(",",".")
    );

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({action:"totalGeral",valor})
    });

    document.getElementById("valorGeralManual").value="";
    carregarDados();
}

function atualizarDashboard(){
    let totalCalculado=0;
    let mensalHTML="";
    let semanalHTML="";

    const ranking=[...dados].sort((a,b)=>b.mensal-a.mensal);

    dados.forEach(item=>{
        totalCalculado+=Number(item.mensal);

        const pctMensal=percentual(item.mensal,META_MENSAL);
        const pctSemanal=percentual(item.semanal,META_SEMANAL);

        mensalHTML+=`
        <div>${item.vendedor}: R$ ${formatar(item.mensal)} (${pctMensal.toFixed(1)}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(pctMensal,100)}%; background:${corBarra(pctMensal)}"></div>
        </div>`;

        semanalHTML+=`
        <div>${item.vendedor}: R$ ${formatar(item.semanal)} (${pctSemanal.toFixed(1)}%)</div>
        <div class="progress-container">
            <div class="progress-bar" style="width:${Math.min(pctSemanal,100)}%; background:${corBarra(pctSemanal)}"></div>
        </div>`;
    });

    const totalFinal=totalManual ?? totalCalculado;
    const pctLoja=percentual(totalFinal,META_LOJA);

    document.getElementById("totalLoja").innerText=formatar(totalFinal);
    document.getElementById("percentLoja").innerText=pctLoja.toFixed(1)+"%";

    const barra=document.getElementById("barraLoja");
    barra.style.width=Math.min(pctLoja,100)+"%";
    barra.style.background=corBarra(pctLoja);

    document.getElementById("metaInfo").innerHTML=
        `Faltam R$ ${formatar(Math.max(0,META_LOJA-totalFinal))}`;

    document.getElementById("performanceMensal").innerHTML=mensalHTML;
    document.getElementById("performanceSemanal").innerHTML=semanalHTML;

    document.getElementById("ranking").innerHTML=
        ranking.map((r,i)=>`
        <div class="rank-item">
            <span>${i+1}º ${r.vendedor}</span>
            <span>R$ ${formatar(r.mensal)}</span>
        </div>
        `).join("");
}

setInterval(carregarDados,3000);
carregarDados();
</script>

</body>
</html>
