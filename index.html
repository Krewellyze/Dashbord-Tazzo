<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO Dashboard Premium</title>

<style>
@font-face {
    font-family: 'BringRace';
    src: url('BringRace.woff2') format('woff2');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#2b0000,#7a0000,#b30000);
    min-height:100vh;
    color:white;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.logo{
    font-family:'BringRace', Arial, sans-serif;
    font-size:48px;
    text-align:center;
    margin-bottom:25px;
    letter-spacing:3px;
}

.logo .zz{
    color:red;
}

.card{
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr auto;
    gap:12px;
}

input,select,button{
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

button{
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.02);
}

.cards-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:18px;
}

.barra{
    width:100%;
    height:12px;
    background:rgba(255,255,255,0.1);
    border-radius:30px;
    overflow:hidden;
    margin:10px 0;
}

.progresso{
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff4d4d);
    transition:0.5s;
}

.valor{
    font-size:26px;
    font-weight:bold;
}

.sub{
    opacity:0.9;
    margin-top:6px;
}

.ranking-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .logo{
        font-size:36px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">
        TA<span class="zz">ZZ</span>O
    </div>

    <div class="card">
        <div class="form-grid">
            <select id="vendedor">
                <option>Joabe</option>
                <option>João Gabriel</option>
                <option>Fábio</option>
                <option>Caio Henrique</option>
            </select>

            <input id="valorVendaDia" placeholder="Valor vendido no dia">

            <button onclick="adicionarVendaDia()">
                Adicionar
            </button>
        </div>
    </div>

    <div id="dashboardCards" class="cards-grid"></div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwKI2tgh4mqvRu-bkzH6Cmr0VpfyHMaFMDn9BtWMYFsOsigDMSp3Z-7veJO569mh78/exec";

const metas = {
    diaria: 2917,
    semanal: 17500,
    mensal: 70000,
    loja: 210000
};

const vendedores = ["Joabe","João Gabriel","Fábio"];
const gerente = "Caio Henrique";

let vendas = [];
let resumo = {};

function moeda(v){
    return v.toLocaleString("pt-BR",{
        style:"currency",
        currency:"BRL"
    });
}

async function carregarDashboard(){
    try{
        const response = await fetch(API_URL);
        const dados = await response.json();

        vendas = dados.slice(1);

        calcularResumo();
        renderizarDashboard();

    }catch(e){
        console.error(e);
    }
}

function calcularResumo(){
    resumo = {};
    let totalLoja = 0;

    vendedores.forEach(v=>{
        resumo[v] = {
            semanal:0,
            mensal:0
        };
    });

    vendas.forEach(linha=>{
        const nome = linha[0];
        const valor = parseFloat(
            String(linha[1]).replace(",",".")
        ) || 0;

        totalLoja += valor;

        if(resumo[nome]){
            resumo[nome].mensal += valor;
            resumo[nome].semanal += valor;
        }
    });

    resumo.totalLoja = totalLoja;
}

async function adicionarVendaDia(){
    const vendedor = document.getElementById("vendedor").value;

    const valor = parseFloat(
        document.getElementById("valorVendaDia")
        .value
        .replace(/\./g,"")
        .replace(",",".")
    );

    if(!valor){
        alert("Digite um valor válido");
        return;
    }

    await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            vendedor,
            valor
        })
    });

    document.getElementById("valorVendaDia").value = "";

    carregarDashboard();
}

function renderizarDashboard(){
    let ranking = vendedores.map(v=>({
        nome:v,
        valor:resumo[v].mensal
    }));

    ranking.sort((a,b)=>b.valor-a.valor);

    let html = "";

    ranking.forEach((v,index)=>{
        const pctMensal = (v.valor/metas.mensal)*100;
        const pctSemanal = (v.valor/metas.semanal)*100;

        html += `
        <div class="card">
            <h3>#${index+1} ${v.nome}</h3>
            <div class="valor">${moeda(v.valor)}</div>

            <div class="sub">Meta semanal</div>
            <div class="barra">
                <div class="progresso" style="width:${Math.min(pctSemanal,100)}%"></div>
            </div>

            <div class="sub">Meta mensal</div>
            <div class="barra">
                <div class="progresso" style="width:${Math.min(pctMensal,100)}%"></div>
            </div>

            <div>${pctMensal.toFixed(1)}%</div>
        </div>
        `;
    });

    const pctLoja = (resumo.totalLoja/metas.loja)*100;

    html += `
    <div class="card">
        <h2>Meta Geral da Loja</h2>
        <div class="valor">${moeda(resumo.totalLoja)}</div>
        <div class="barra">
            <div class="progresso" style="width:${Math.min(pctLoja,100)}%"></div>
        </div>
        <div>${pctLoja.toFixed(1)}%</div>
    </div>
    `;

    document.getElementById("dashboardCards").innerHTML = html;
}

setInterval(carregarDashboard,10000);

window.onload = carregarDashboard;
</script>

</body>
</html>
