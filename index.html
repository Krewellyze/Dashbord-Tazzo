<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TAZZO | Dashboard Premium V8</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:#fff;
    font-family:Arial,sans-serif;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}
.container{max-width:480px;margin:auto}
.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:18px;
}
.logo span{font-family:'Bring Race',sans-serif !important}
.white{color:#fff}
.red{color:#ff0000;text-shadow:0 0 8px #ff0000}

.card{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,0.18);
    backdrop-filter:blur(12px);
}
h3{margin-bottom:12px}

input,select,button{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}
input,select{
    background:rgba(0,0,0,0.35);
    color:#fff;
}
button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:#fff;
    font-weight:bold;
}

.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    overflow:hidden;
    margin:8px 0;
}
.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
    transition:.5s;
}

.rank-item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
<span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
</div>

<div class="card">
<h3>Meta Geral da Loja</h3>
<div>Total: R$ <span id="totalLoja">0,00</span></div>
<div id="percentLoja">0%</div>
<div class="progress-container">
<div class="progress-bar" id="barraLoja"></div>
</div>
<div id="metaInfo"></div>
</div>

<div class="card">
<h3>Lançamento Diário</h3>

<select id="vendedor">
<option>Joabe</option>
<option>João Gabriel</option>
<option>Fábio</option>
<option>Caio Henrique</option>
</select>

<input type="text" inputmode="decimal" id="valorVendaDia" placeholder="Valor vendido no dia">

<button onclick="adicionarVendaDia()">Adicionar valor</button>
</div>

<div class="card">
<h3>Performance Mensal</h3>
<div id="performanceMensal"></div>
</div>

<div class="card">
<h3>Performance Semanal</h3>
<div id="performanceSemanal"></div>
<div style="margin-top:10px;font-size:13px;color:#ddd;">
Última semana:<br>
João Gabriel: R$ <span id="lastJoao">13.077,33</span><br>
Fábio: R$ <span id="lastFabio">15.809,44</span><br>
Joabe: R$ <span id="lastJoabe">16.114,43</span>
</div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<button onclick="gerarPDFDiario()">Relatório Diário</button>
<button onclick="gerarPDFMensal()">Relatório Mensal</button>
<button onclick="iniciarNovoMes()">Iniciar Novo Mês</button>

</div>

<script>
const META_LOJA=210000;
const META_MENSAL=70000;
const META_SEMANAL=17500;

const vendedores=["Joabe","João Gabriel","Fábio"];

let vendas=JSON.parse(localStorage.getItem("tazzoDashboard"))||{
    "Joabe":0,
    "João Gabriel":0,
    "Fábio":0,
    "Caio Henrique":0
};

let semanaAtualStorage=localStorage.getItem("tazzoSemanaAtual");
let semanaVendas=JSON.parse(localStorage.getItem("tazzoSemana"))||{
    "Joabe":0,
    "João Gabriel":0,
    "Fábio":0
};

let ultimaSemana=JSON.parse(localStorage.getItem("tazzoUltimaSemana"))||{
    "Joabe":16114.43,
    "João Gabriel":13077.33,
    "Fábio":15809.44
};

let vendasDiarias=JSON.parse(localStorage.getItem("tazzoDiario"))||[];

function formatar(v){
    return v.toLocaleString("pt-BR",{minimumFractionDigits:2});
}

function percentual(v,m){
    return ((v/m)*100).toFixed(1);
}

function obterSemanaAno(){
    const d=new Date();
    const first=new Date(d.getFullYear(),0,1);
    return Math.ceil((((d-first)/86400000)+first.getDay()+1)/7);
}

function verificarNovaSemana(){
    const semanaAtual=obterSemanaAno();

    if(semanaAtualStorage==null){
        localStorage.setItem("tazzoSemanaAtual",semanaAtual);
        semanaAtualStorage=semanaAtual;
        return;
    }

    if(parseInt(semanaAtualStorage)!==semanaAtual){
        ultimaSemana={...semanaVendas};

        localStorage.setItem("tazzoUltimaSemana",JSON.stringify(ultimaSemana));

        semanaVendas={
            "Joabe":0,
            "João Gabriel":0,
            "Fábio":0
        };

        localStorage.setItem("tazzoSemana",JSON.stringify(semanaVendas));
        localStorage.setItem("tazzoSemanaAtual",semanaAtual);

        semanaAtualStorage=semanaAtual;
    }
}

function salvar(){
    localStorage.setItem("tazzoDashboard",JSON.stringify(vendas));
    localStorage.setItem("tazzoSemana",JSON.stringify(semanaVendas));
    localStorage.setItem("tazzoUltimaSemana",JSON.stringify(ultimaSemana));
    localStorage.setItem("tazzoDiario",JSON.stringify(vendasDiarias));
}

function adicionarVendaDia(){
    verificarNovaSemana();

    let nome=document.getElementById("vendedor").value;
    let valorTexto=document.getElementById("valorVendaDia").value
        .replace(/\./g,"")
        .replace(",", ".");

    let valor=parseFloat(valorTexto);

    if(isNaN(valor)||valor<=0)return;

    vendas[nome]+=valor;

    if(vendedores.includes(nome)){
        semanaVendas[nome]+=valor;
    }

    vendasDiarias.push({
        vendedor:nome,
        valor,
        data:new Date().toLocaleDateString("pt-BR")
    });

    document.getElementById("valorVendaDia").value="";
    atualizarDashboard();
}

function atualizarDashboard(){
    verificarNovaSemana();

    atualizarMetaGeral();
    atualizarMensal();
    atualizarSemanal();
    atualizarRanking();
    salvar();
}

function atualizarMetaGeral(){
    let total=Object.values(vendas).reduce((a,b)=>a+b,0);
    let pct=percentual(total,META_LOJA);

    document.getElementById("totalLoja").innerText=formatar(total);
    document.getElementById("percentLoja").innerText=pct+"%";
    document.getElementById("barraLoja").style.width=pct+"%";

    let faltam=Math.max(0,META_LOJA-total);
    document.getElementById("metaInfo").innerHTML=
        `Faltam R$ ${formatar(faltam)} para a meta`;
}

function atualizarMensal(){
    let html="";

    vendedores.forEach(nome=>{
        let valor=vendas[nome];
        let pct=percentual(valor,META_MENSAL);

        html+=`
        <div style="margin-bottom:14px;">
            <div>${nome}: R$ ${formatar(valor)} (${pct}%)</div>
            <div class="progress-container">
                <div class="progress-bar" style="width:${pct}%"></div>
            </div>
        </div>`;
    });

    document.getElementById("performanceMensal").innerHTML=html;
}

function atualizarSemanal(){
    let html="";

    vendedores.forEach(nome=>{
        let valor=semanaVendas[nome];
        let pct=percentual(valor,META_SEMANAL);

        html+=`
        <div style="margin-bottom:14px;">
            <div>${nome}: R$ ${formatar(valor)} (${pct}%)</div>
            <div class="progress-container">
                <div class="progress-bar" style="width:${pct}%"></div>
            </div>
        </div>`;
    });

    document.getElementById("performanceSemanal").innerHTML=html;

    document.getElementById("lastJoao").innerText=formatar(ultimaSemana["João Gabriel"]);
    document.getElementById("lastFabio").innerText=formatar(ultimaSemana["Fábio"]);
    document.getElementById("lastJoabe").innerText=formatar(ultimaSemana["Joabe"]);
}

function atualizarRanking(){
    let ranking=vendedores
        .map(v=>[v,vendas[v]])
        .sort((a,b)=>b[1]-a[1]);

    let medals=["🥇","🥈","🥉"];
    let html="";

    ranking.forEach((item,index)=>{
        html+=`
        <div class="rank-item">
            <span>${medals[index]} ${item[0]}</span>
            <span>R$ ${formatar(item[1])}</span>
        </div>`;
    });

    document.getElementById("ranking").innerHTML=html;
}

function iniciarNovoMes(){
    if(!confirm("Deseja iniciar novo mês?")) return;

    vendas={
        "Joabe":0,
        "João Gabriel":0,
        "Fábio":0,
        "Caio Henrique":0
    };

    semanaVendas={
        "Joabe":0,
        "João Gabriel":0,
        "Fábio":0
    };

    vendasDiarias=[];

    atualizarDashboard();
}

function gerarPDFDiario(){
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF();

    pdf.text("Relatório Diário",20,20);

    let y=40;

    vendasDiarias.forEach(item=>{
        pdf.text(`${item.vendedor}: R$ ${formatar(item.valor)}`,20,y);
        y+=10;
    });

    pdf.save("relatorio-diario.pdf");
}

function gerarPDFMensal(){
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF();

    pdf.text("Relatório Mensal",20,20);

    let y=40;

    Object.entries(vendas).forEach(item=>{
        pdf.text(`${item[0]}: R$ ${formatar(item[1])}`,20,y);
        y+=10;
    });

    pdf.save("relatorio-mensal.pdf");
}

atualizarDashboard();
</script>

</body>
</html>
