<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAZZO | Dashboard Premium</title>

<link href="https://fonts.cdnfonts.com/css/bring-race" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#180000,#8b0000,#1a0000);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    padding:20px;
    color:white;
    font-family:Arial,sans-serif;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    max-width:460px;
    margin:auto;
}

.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:18px;
}

.logo span{
    font-family:'Bring Race',sans-serif !important;
}

.white{color:white;}
.red{
    color:#ff0000;
    text-shadow:0 0 8px #ff0000;
}

.subtitle{
    text-align:center;
    color:#ddd;
    margin-bottom:8px;
    font-size:14px;
}

.data-atual{
    text-align:center;
    color:#ddd;
    margin-bottom:18px;
    font-size:13px;
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 0 20px rgba(255,0,0,0.18);
    backdrop-filter:blur(12px);
}

.card h3{
    margin-bottom:15px;
    font-size:18px;
}

.meta{
    margin:8px 0;
    font-size:15px;
}

.info-extra{
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    font-size:14px;
    color:#ddd;
    line-height:1.6;
}

.progress-container{
    width:100%;
    height:14px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    overflow:hidden;
    margin-top:8px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ff0000,#ff5c5c);
    transition:width .6s ease;
}

.percentual{
    font-size:13px;
    color:#ddd;
    margin-top:4px;
    margin-bottom:8px;
}

input,select,button{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,select{
    background:rgba(0,0,0,0.35);
    color:white;
}

button{
    background:linear-gradient(90deg,#ff0000,#8b0000);
    color:white;
    font-weight:bold;
}

.rank-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.08);
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">
        <span class="white">TA</span><span class="red">ZZ</span><span class="white">O</span>
    </div>

    <div class="subtitle">Dashboard Premium de Metas</div>
    <div id="dataAtual" class="data-atual"></div>

    <div class="card">
        <h3>Meta Geral da Loja</h3>
        <div class="meta">Meta: R$ 210.000,00</div>
        <div class="meta">Atual: R$ <span id="totalLoja">0,00</span></div>
        <div class="percentual" id="percentLoja">0%</div>
        <div class="progress-container">
            <div class="progress-bar" id="barraLoja"></div>
        </div>

        <div class="info-extra" id="metaRestanteInfo"></div>
    </div>

    <div class="card">
        <h3>Lançamento Diário</h3>

        <select id="vendedor">
            <option>Joabe</option>
            <option>João Gabriel</option>
            <option>Fábio</option>
        </select>

        <input type="number" id="valorVendaDia" placeholder="Valor vendido no dia">

        <button onclick="adicionarVendaDia()">Adicionar valor do dia</button>
    </div>

    <div class="card">
        <h3>Performance por vendedor</h3>

        <div class="meta">Joabe: R$ <span id="joabe">0,00</span></div>
        <div class="percentual" id="percJoabe">0%</div>
        <div class="progress-container"><div class="progress-bar" id="barJoabe"></div></div>

        <div class="meta">João Gabriel: R$ <span id="joao">0,00</span></div>
        <div class="percentual" id="percJoao">0%</div>
        <div class="progress-container"><div class="progress-bar" id="barJoao"></div></div>

        <div class="meta">Fábio: R$ <span id="fabio">0,00</span></div>
        <div class="percentual" id="percFabio">0%</div>
        <div class="progress-container"><div class="progress-bar" id="barFabio"></div></div>
    </div>

    <div class="card">
        <h3>Ranking do Mês</h3>
        <div id="ranking"></div>
    </div>

    <button onclick="gerarPDF()">Relatório Mensal em PDF</button>
    <button onclick="limparDashboard()">Iniciar Novo Mês</button>

</div>

<script>
const META_MENSAL = 70000;
const META_LOJA = 210000;

let vendas = JSON.parse(localStorage.getItem("tazzoDashboard")) || {
    "Joabe":0,
    "João Gabriel":0,
    "Fábio":0
};

function salvar(){
    localStorage.setItem("tazzoDashboard", JSON.stringify(vendas));
}

function formatar(valor){
    return valor.toLocaleString("pt-BR", {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function percentual(valor, meta){
    return ((valor/meta)*100).toFixed(1);
}

function calcularMetaRestante(total){
    const hoje = new Date();

    const ano = hoje.getFullYear();
    const mes = hoje.getMonth();

    const ultimoDia = new Date(ano, mes + 1, 0).getDate();
    const diaAtual = hoje.getDate();

    const diasRestantes = ultimoDia - diaAtual + 1;

    const faltante = Math.max(0, META_LOJA - total);
    const diariaNecessaria = faltante / diasRestantes;

    return {
        faltante,
        diasRestantes,
        diariaNecessaria
    };
}

function atualizarDashboard(){
    document.getElementById("joabe").innerText = formatar(vendas["Joabe"]);
    document.getElementById("joao").innerText = formatar(vendas["João Gabriel"]);
    document.getElementById("fabio").innerText = formatar(vendas["Fábio"]);

    document.getElementById("percJoabe").innerText = percentual(vendas["Joabe"], META_MENSAL)+"% da meta";
    document.getElementById("percJoao").innerText = percentual(vendas["João Gabriel"], META_MENSAL)+"% da meta";
    document.getElementById("percFabio").innerText = percentual(vendas["Fábio"], META_MENSAL)+"% da meta";

    document.getElementById("barJoabe").style.width = percentual(vendas["Joabe"], META_MENSAL)+"%";
    document.getElementById("barJoao").style.width = percentual(vendas["João Gabriel"], META_MENSAL)+"%";
    document.getElementById("barFabio").style.width = percentual(vendas["Fábio"], META_MENSAL)+"%";

    let total = Object.values(vendas).reduce((a,b)=>a+b,0);

    document.getElementById("totalLoja").innerText = formatar(total);
    document.getElementById("percentLoja").innerText = percentual(total, META_LOJA)+"% da meta";
    document.getElementById("barraLoja").style.width = percentual(total, META_LOJA)+"%";

    const metaInfo = calcularMetaRestante(total);

    document.getElementById("metaRestanteInfo").innerHTML = `
        Faltam <strong>R$ ${formatar(metaInfo.faltante)}</strong><br>
        Restam <strong>${metaInfo.diasRestantes} dias</strong> no mês<br>
        Necessário vender <strong>R$ ${formatar(metaInfo.diariaNecessaria)}</strong> por dia
    `;

    atualizarRanking();
    salvar();
}

function atualizarRanking(){
    const ranking = Object.entries(vendas)
        .sort((a,b)=>b[1]-a[1]);

    const medals = ["🥇","🥈","🥉"];

    let html = "";

    ranking.forEach((item,index)=>{
        html += `
            <div class="rank-item">
                <span>${medals[index]} ${item[0]}</span>
                <span>R$ ${formatar(item[1])}</span>
            </div>
        `;
    });

    document.getElementById("ranking").innerHTML = html;
}

function adicionarVendaDia(){
    let vendedor = document.getElementById("vendedor").value;
    let valor = parseFloat(document.getElementById("valorVendaDia").value);

    if(isNaN(valor) || valor<=0) return;

    vendas[vendedor] += valor;
    document.getElementById("valorVendaDia").value = "";
    atualizarDashboard();
}

function limparDashboard(){
    if(confirm("Deseja iniciar um novo mês?")){
        vendas = {
            "Joabe":0,
            "João Gabriel":0,
            "Fábio":0
        };
        atualizarDashboard();
    }
}

function atualizarDataHora(){
    const agora = new Date();

    const opcoes = {
        timeZone:"America/Sao_Paulo",
        day:"2-digit",
        month:"2-digit",
        year:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit"
    };

    document.getElementById("dataAtual").innerText =
        agora.toLocaleString("pt-BR", opcoes) + " • Horário de Brasília";
}

function gerarPDF(){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    const data = new Date();
    const dataFormatada = data.toLocaleDateString("pt-BR");
    const total = Object.values(vendas).reduce((a,b)=>a+b,0);

    const metaInfo = calcularMetaRestante(total);

    pdf.setFontSize(24);
    pdf.text("TAZZO", 105, 20, { align:"center" });

    pdf.setFontSize(16);
    pdf.text("Relatório Mensal de Performance", 105, 30, { align:"center" });

    pdf.line(20,36,190,36);

    pdf.setFontSize(12);
    pdf.text(`Data: ${dataFormatada}`,20,45);

    pdf.text(`Joabe: R$ ${formatar(vendas["Joabe"])} (${percentual(vendas["Joabe"], META_MENSAL)}%)`,25,70);
    pdf.text(`João Gabriel: R$ ${formatar(vendas["João Gabriel"])} (${percentual(vendas["João Gabriel"], META_MENSAL)}%)`,25,85);
    pdf.text(`Fábio: R$ ${formatar(vendas["Fábio"])} (${percentual(vendas["Fábio"], META_MENSAL)}%)`,25,100);

    pdf.text(`Total loja: R$ ${formatar(total)}`,25,125);
    pdf.text(`Percentual meta: ${percentual(total, META_LOJA)}%`,25,140);

    pdf.text(`Faltam: R$ ${formatar(metaInfo.faltante)}`,25,160);
    pdf.text(`Dias restantes: ${metaInfo.diasRestantes}`,25,175);
    pdf.text(`Meta diária necessária: R$ ${formatar(metaInfo.diariaNecessaria)}`,25,190);

    pdf.save(`relatorio-tazzo-${dataFormatada.replace(/\//g,"-")}.pdf`);
}

setInterval(atualizarDataHora, 1000);
atualizarDataHora();
atualizarDashboard();
</script>

</body>
</html>
